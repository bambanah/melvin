name: "Update Visual Baselines"

# Baseline-acceptance workflow: regenerates all visual baselines (PDF PNG
# renders + Playwright UI screenshots) on ubuntu — the authoritative
# platform — and commits them to the given branch. The PR then shows
# old-vs-new image diffs (GitHub's swipe/onion-skin view) for reviewer
# sign-off.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to regenerate baselines on"
        required: true
        type: string

env:
  DATABASE_URL: postgres://postgres:pass@localhost:5432/melvin
  DIRECT_URL: postgres://postgres:pass@localhost:5432/melvin
  NEXTAUTH_URL: "http://localhost:3000"

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.branch }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install

      - name: Regenerate PDF PNG baselines
        run: UPDATE_PDF_SNAPSHOTS=1 pnpm vitest run src/lib/pdf-generation.render.test.ts

      - name: Install playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Initialise database
        run: pnpm prisma:push

      - name: Regenerate UI screenshot baselines
        run: pnpm exec playwright test --project=visual --update-snapshots

      - name: Commit updated baselines
        run: |
          git add "src/lib/__pdf_snapshots__" "src/lib/__pdf_text__" "e2e/visual/__screenshots__"
          if git diff --cached --quiet; then
            echo "Baselines unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update visual baselines"
            git push origin "HEAD:${{ inputs.branch }}"
          fi
